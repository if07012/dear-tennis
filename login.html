<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Dear Tennis</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ===================================
           ENHANCED LOGIN PAGE ANIMATIONS
           =================================== */
        
        /* Animated Background */
        .login-section {
            background: linear-gradient(135deg, #1a3d3a 0%, #2C5F4B 25%, #3d7a63 50%, #1e4234 75%, #2C5F4B 100%);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        /* Floating Particles */
        .particles-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }
        
        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(2px);
            animation: floatParticle linear infinite;
        }
        
        @keyframes floatParticle {
            0% {
                transform: translateY(100vh) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(-100vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        /* Glow Effect Following Cursor */
        .cursor-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(95, 158, 160, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
            transform: translate(-50%, -50%);
            transition: opacity 0.3s ease;
        }
        
        /* Enhanced Login Card */
        .login-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 
                0 8px 32px rgba(0, 0, 0, 0.1),
                0 0 0 1px rgba(255, 255, 255, 0.1) inset;
            position: relative;
            overflow: hidden;
        }
        
        .login-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(
                from 0deg,
                transparent,
                rgba(44, 95, 75, 0.03),
                transparent 30%
            );
            animation: borderGlow 8s linear infinite;
            pointer-events: none;
        }
        
        @keyframes borderGlow {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .login-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(
                135deg,
                rgba(255, 255, 255, 0.4) 0%,
                transparent 50%,
                rgba(255, 255, 255, 0.2) 100%
            );
            pointer-events: none;
        }
        
        .login-card-content {
            position: relative;
            z-index: 1;
        }
        
        /* Logo Animation */
        .login-logo {
            display: inline-block;
            margin-bottom: 20px;
        }
        
        .login-logo svg {
            width: 60px;
            height: 60px;
            color: var(--spicy-paprika);
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .login-logo:hover svg {
            transform: scale(1.1) rotate(10deg);
            filter: drop-shadow(0 4px 8px rgba(232, 93, 4, 0.3));
        }
        
        /* Enhanced Form Inputs */
        .form-group {
        }
        
        .form-group input {
            z-index: 1;
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .form-group input:focus {
            transform: scale(1.02);
            box-shadow: 
                0 0 0 4px rgba(44, 95, 75, 0.1),
                0 4px 12px rgba(44, 95, 75, 0.15);
        }
        
        .form-group.valid input {
            border-color: #2C5F4B;
            box-shadow: 0 0 0 4px rgba(44, 95, 75, 0.1);
        }
        
        .form-group.invalid input {
            animation: shakeInput 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97);
            border-color: #E85D04;
        }
        
        @keyframes shakeInput {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-5px); }
            20%, 40%, 60%, 80% { transform: translateX(5px); }
        }
        
        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dark-gray);
            transition: all 0.3s ease;
            pointer-events: none;
        }
        
        .form-group input:focus + .input-icon,
        .form-group.focused .input-icon {
            color: var(--hunter-green);
            transform: translateY(-50%) scale(1.1);
        }
        
        .form-group input {
            z-index: 1;
            padding-left: 44px;
        }
        
        /* Floating Label */
        .floating-label {
            position: absolute;
            left: 44px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--dark-gray);
            font-size: 1rem;
            pointer-events: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
            padding: 0 4px;
        }
        
        .form-group input:focus ~ .floating-label,
        .form-group input:not(:placeholder-shown) ~ .floating-label,
        .form-group.focused .floating-label {
            top: 0;
            left: 44px;
            padding: 0 6px;
            margin-top: -10px;
            font-size: 0.75rem;
            color: var(--hunter-green);
            background: var(--white);
            border-radius: 4px;
        }
        
        /* Toggle Password Button */
        .toggle-password {
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .toggle-password:hover {
            transform: scale(1.1);
            color: var(--hunter-green);
        }
        
        .toggle-password svg {
            transition: all 0.3s ease;
        }
        
        /* Custom Checkbox */
        .checkbox-label {
            position: relative;
            padding-left: 28px;
            cursor: pointer;
        }
        
        .checkbox-label input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            cursor: pointer;
        }
        
        .checkbox-custom {
            position: absolute;
            top: 0;
            left: 0;
            width: 18px;
            height: 18px;
            border: 2px solid var(--light-gray);
            border-radius: 4px;
            transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .checkbox-label:hover .checkbox-custom {
            border-color: var(--hunter-green);
            transform: scale(1.1);
        }
        
        .checkbox-label input[type="checkbox"]:checked ~ .checkbox-custom {
            background: var(--hunter-green);
            border-color: var(--hunter-green);
            animation: checkBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        .checkbox-custom::after {
            content: '';
            position: absolute;
            display: none;
            left: 5px;
            top: 1px;
            width: 5px;
            height: 10px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }
        
        .checkbox-label input[type="checkbox"]:checked ~ .checkbox-custom::after {
            display: block;
        }
        
        @keyframes checkBounce {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }
        
        /* Forgot Password Link */
        .forgot-link {
            position: relative;
            overflow: hidden;
        }
        
        .forgot-link::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 1px;
            background: var(--spicy-paprika);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .forgot-link:hover::after {
            width: 100%;
        }
        
        /* Enhanced Login Button */
        #loginBtn {
            position: relative;
            overflow: hidden;
            transition: all 0.15s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        #loginBtn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.2);
            transform: translate(-50%, -50%);
            transition: width 0.3s ease, height 0.3s ease;
        }
        
        #loginBtn:hover::before {
            width: 300px;
            height: 300px;
        }
        
        #loginBtn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 
                0 8px 24px rgba(232, 93, 4, 0.3),
                0 0 0 4px rgba(232, 93, 4, 0.1);
        }
        
        #loginBtn:active {
            transform: translateY(0) scale(0.98);
        }
        
        #loginBtn.loading {
            pointer-events: none;
        }
        
        #loginBtn.success {
            background: #2C5F4B;
            animation: successPulse 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        
        @keyframes successPulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }
        
        .btn-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        
        #loginBtn.loading .btn-spinner {
            display: inline-block;
        }
        
        #loginBtn.loading .btn-text {
            margin-left: 8px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .success-checkmark {
            display: none;
            width: 24px;
            height: 24px;
            stroke-dasharray: 50;
            stroke-dashoffset: 50;
            animation: drawCheck 0.5s ease forwards;
        }
        
        @keyframes drawCheck {
            to {
                stroke-dashoffset: 0;
            }
        }
        
        /* Page Transition Overlay */
        .page-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: var(--hunter-green);
            z-index: 9999;
            transform: scaleY(0);
            transform-origin: bottom;
            pointer-events: none;
        }
        
        .page-overlay.active {
            transform: scaleY(1);
            transition: transform 0.6s cubic-bezier(0.76, 0, 0.24, 1);
        }
        
        .page-overlay.exit {
            transform-origin: top;
            transform: scaleY(1);
            transition: transform 0.6s cubic-bezier(0.76, 0, 0.24, 1);
        }
        
        /* Reduced Motion */
        @media (prefers-reduced-motion: reduce) {
            *,
            *::before,
            *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
            
            .login-card {
                transform: none;
                opacity: 1;
            }
        }
        
        /* Mobile Optimizations */
        @media (max-width: 768px) {
            .cursor-glow {
                display: none;
            }
            
            .particle {
                animation-duration: 20s;
            }
            
            .login-card {
                padding: 40px 30px;
            }
            
            .login-card::before {
                display: none;
            }
        }
    </style>
</head>
<body>
    <!-- Page Transition Overlay -->
    <div class="page-overlay" id="pageOverlay"></div>
    
    <!-- Login Section -->
    <section class="login-section">
        <!-- Animated Background Elements -->
        <div class="particles-container" id="particlesContainer"></div>
        <div class="cursor-glow" id="cursorGlow"></div>
        
        <div class="login-background"></div>
        <div class="login-wrapper">
            <div class="login-card" id="loginCard">
                <div class="login-card-content">
                    <!-- Logo -->
                    <div class="login-logo" id="loginLogo">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/>
                            <path d="M12 2a14.5 14.5 0 0 0 0 20 14.5 14.5 0 0 0 0-20"/>
                            <path d="M2 12h20"/>
                        </svg>
                    </div>
                    
                    <div class="login-header">
                        <h1 class="login-title">Welcome Back</h1>
                        <p class="login-subtitle">Sign in to access your member account</p>
                    </div>

                    <form class="login-form" id="loginForm">
                        <div class="form-group" id="emailGroup">
                            <input type="email" id="email" name="email" placeholder=" " required autocomplete="email">
                            <label for="email" class="floating-label">Email Address</label>
                            <span class="input-icon">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20">
                                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                                    <polyline points="22,6 12,13 2,6"/>
                                </svg>
                            </span>
                        </div>

                        <div class="form-group" id="passwordGroup">
                            <input type="password" id="password" name="password" placeholder=" " required autocomplete="current-password">
                            <label for="password" class="floating-label">Password</label>
                            <button type="button" class="toggle-password" id="togglePassword" aria-label="Toggle password visibility">
                                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                </svg>
                                <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display: none;">
                                    <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                                    <circle cx="12" cy="12" r="3"/>
                                    <line x1="1" y1="1" x2="23" y2="23"/>
                                </svg>
                            </button>
                        </div>

                        <div class="form-options" id="formOptions">
                            <label class="checkbox-label">
                                <input type="checkbox" id="rememberMe" name="rememberMe">
                                <span class="checkbox-custom"></span>
                                <span>Remember me</span>
                            </label>
                            <a href="#" class="forgot-link" id="forgotLink">Forgot Password?</a>
                        </div>

                        <button type="submit" class="btn btn-primary btn-full btn-large" id="loginBtn">
                            <span class="btn-spinner"></span>
                            <span class="btn-text">Sign In</span>
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <!-- GSAP for Animations -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
